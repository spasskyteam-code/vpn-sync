name: Update VPN Config
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run filter
        run: |
          # 1. Готовим auto.txt
          curl -L "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" > all.txt
          curl -L "https://raw.githubusercontent.com/zieng2/wl/main/vless_universal.txt" >> all.txt
          curl -L "https://codeberg.org/zieng2/wl/raw/branch/main/vless_universal.txt" >> all.txt
          curl -L "https://gitlab.com/zieng2/wl/raw/main/vless_universal.txt" >> all.txt
          grep -vE "#.*(Russia|Anycast)" all.txt > my.txt
          # Убираем лишние символы, которые могут сломать JSON
          content_auto=$(cat my.txt | jq -aRs .)

          # 2. Готовим black.txt
          curl -L "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_SS+All_RUS.txt" > black_all.txt
          grep -vE "#.*(Russia|Anycast)" black_all.txt > black_my.txt
          content_black=$(cat black_my.txt | jq -aRs .)

          # 3. Отправляем ОБА файла одним махом в основной Gist
          # Мы создаем один большой JSON с обоими файлами
          echo "{\"files\": {\"auto.txt\": {\"content\": $content_auto}, \"black.txt\": {\"content\": $content_black}}}" > final.json
          
          curl -X PATCH \
            -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @final.json \
            https://api.github.com/gists/633322f43c3751c0c8bc983df6f12e0
